services:
  - type: web
    name: plum-claims-pipeline
    runtime: python
    plan: free
    buildCommand: |
      set -e
      python -m pip install --upgrade pip setuptools wheel
      python -m pip install -r backend/requirements.txt
      cd frontend && npm ci && npm run build
    startCommand: cd backend && python -m uvicorn app.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/test-cases
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
