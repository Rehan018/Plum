services:
  - type: web
    name: plum-claims-pipeline
    runtime: python
    plan: free
    buildCommand: |
      pip install -r backend/requirements.txt
      cd frontend && npm ci && npm run build
    startCommand: cd backend && uvicorn app.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/test-cases
    autoDeploy: true
